# Railway deployment config for the backend service.
# IMPORTANT: In the Railway dashboard → Settings → Root Directory = "backend"
# This file is read AFTER Railway resolves the root directory.

[build]
builder = "NIXPACKS"
buildCommand = "npm install --include=dev && npm run build"

[deploy]
startCommand = "node dist/server.js"
healthcheckPath = "/api/health"
healthcheckTimeout = 30
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
